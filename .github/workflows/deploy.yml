name: Deploy Backend to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_setup:
        description: 'Run full first-time setup (yes/no)'
        required: false
        default: 'no'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 187.77.186.137
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          timeout: 120s
          script: |
            set -e

            APP_DIR="/var/www/localchat"

            # ── First-time setup ─────────────────────────────────
            if [ ! -d "$APP_DIR" ]; then
              echo "==> First-time setup..."

              apt-get update -q
              apt-get install -y -q git curl

              # Install Node.js 22.x
              curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
              apt-get install -y nodejs

              mkdir -p /var/www
              git clone https://github.com/Iam-Divyesh/localchat $APP_DIR
              cd $APP_DIR

              npm install -g pm2

              npm install
              npm run build:all

              pm2 start ecosystem.config.js
              pm2 save
              pm2 startup systemd -u root --hp /root | tail -1 | bash

              # Nginx config
              cat > /etc/nginx/sites-available/localchat << 'NGINX'
            server {
                listen 80;
                server_name localchat.thefinelabs.tech;

                location / {
                    proxy_pass http://localhost:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_read_timeout 86400;
                }
            }
            NGINX

              ln -sf /etc/nginx/sites-available/localchat /etc/nginx/sites-enabled/localchat
              rm -f /etc/nginx/sites-enabled/default
              nginx -t && systemctl reload nginx

              echo "==> First-time setup complete!"

            else
              # ── Regular deploy (git pull + rebuild + restart) ────
              echo "==> Updating existing install..."
              cd $APP_DIR

              git fetch origin main
              git reset --hard origin/main

              npm install
              npm run build:all

              pm2 restart localchat || pm2 start ecosystem.config.js
              pm2 save

              echo "==> Deploy complete!"
            fi

            pm2 list
